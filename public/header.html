 <!-- Header -->
    <header class="fixed w-full z-50 glass-effect transition-all duration-300">
        <div class="container mx-auto px-6 py-4">
            <div class="flex justify-between items-center">
                <!-- Logo -->
                <a href="{{linkLogo}}" class="flex items-center space-x-3">
                    <div
                        class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary to-secondary flex items-center justify-center">
                        <img src="{{logoImg}}" alt="{{logoAlt}}">
                    </div>
                    <div>
                        <h1 class="text-lg font-bold">{{siteTitle}}</h1>
                        <p class="text-xs text-text-secondary">{{siteDescription}}</p>
                    </div>
                </a>

                <!-- Desktop Navigation -->
                <nav class="hidden md:flex items-center space-x-8">
                    <a href="{{menuLinks}}" class="nav-link">{{menuName}}</a>
                </nav>

                <!-- Theme Toggle & CTA -->
                <div class="flex items-center space-x-4">
                    <button id="theme-toggle"
                        class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition">
                        <i id="theme-icon" class="fas fa-moon text-gray-600"></i>
                    </button>
                    <a href="{{ctaLink}}" class="btn-primary hidden md:block">
                        {{ctaName}}
                    </a>
                    <button id="menu-toggle" class="md:hidden">
                        <i class="fas fa-bars text-xl"></i>
                    </button>
                </div>
            </div>

            <!-- Mobile Navigation -->
            <div id="mobile-menu" class="hidden md:hidden mt-4 pb-4">
                <div class="flex flex-col space-y-4">
                     <a href="{{menuLinks}}" class="nav-link">{{menuName}}</a>
                    <a href="{{ctaLink}}" class="btn-primary w-full text-center">
                       {{ctaName}}
                    </a>
                </div>
            </div>
        </div>
    </header>
