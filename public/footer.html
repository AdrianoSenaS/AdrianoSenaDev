 <!-- Footer -->
    <footer class="bg-dark  py-12 px-6">
        <div class="container mx-auto">
            <div class="grid md:grid-cols-4 gap-8">
                <div>
                    <div class="flex items-center space-x-3 mb-6">
                        <div
                            class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary to-secondary flex items-center justify-center">
                            <img src="{{logoImg}}" alt="{{logoAlt}}">
                        </div>
                        <div>
                            <div class="font-bold text-lg">{{siteTitle}}</div>
                            <div class="text-gray-400 text-sm">{{siteDescription}}</div>
                        </div>
                    </div>
                    <p class="text-gray-400">
                        {{footerDescription}}
                    </p>
                </div>

                <div>
                    <h4 class="text-lg font-bold mb-6">{{footerTitleService}}</h4>
                    <ul class="space-y-3">
                        <li><a href="{{footerLinkService}}" class="text-gray-400 hover:text-white transition">{{footerLinkName}}</a></li>
                    </ul>
                </div>

                <div>
                    <h4 class="text-lg font-bold mb-6">{{footerTitleFast}}</h4>
                    <ul class="space-y-3">
                        <li><a href="{{footerLinkFast}}" class="text-gray-400 hover:text-white transition">{{footerLinkFastName}}</a></li>

                    </ul>
                </div>

                <div>
                    <h4 class="text-lg font-bold mb-6">{{FooterTitleSocial}}</h4>
                    <div class="flex space-x-4 mb-6 text-white">
                        <a href="{{footerLinkSocial}}" target="_blank"
                            class="w-10 h-10 rounded-lg bg-gray-800 flex items-center justify-center hover:bg-gray-900 transition">
                            <i class="fab {{footerLinkSocialIcon}}"></i>
                        </a>
                    </div>
                    <p class="text-gray-400 text-sm">
                        © <span id="current-year">{{FooterYaer}}</span> {{footerDescriptionCredits}}
                    </p>
                    <a href="{{FooterLinkPrivacy}}" class="text-gray-400 hover:text-white text-sm">{{FooterLinkPrivacyName}}</a>
                </div>
            </div>
        </div>
    </footer>
